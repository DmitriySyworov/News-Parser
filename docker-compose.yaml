services:
  postgres:
    container_name: postgres-news-parser
    image: postgres:16.4
    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres-data:/var/lib/postgresql/data
  redis:
    container_name: redis-news-parser
    image: redis:8.0.2
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS}
    volumes:
      - ./data/redis-data:/data
volumes:
  redis-data:
  postgres-data: